<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zetonic</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="bgVideo" class="bg-layer" autoplay muted loop playsinline></video>
  <div id="bgImage" class="bg-layer bg-image"></div>

  <div id="weatherWidget">
    <span class="weather-icon">🌤</span>
    <div class="weather-info">
      <span class="weather-temp">--°</span>
      <span class="weather-desc">—</span>
      <span class="weather-location">—</span>
    </div>
  </div>

  <main id="mainContent">
    <p id="greeting" class="greeting"></p>
    <p id="dailyFocusDisplay" class="daily-focus"></p>
    <div id="time">00:00</div>
    <div id="date">—</div>
    <div id="searchContainer">
      <span id="searchLogo" class="search-logo">◇</span>
      <input type="text" placeholder="Search…" autocomplete="off" spellcheck="false" id="searchInput">
    </div>
    <div id="quickLinks" class="quick-links"></div>
    <p id="quote" class="quote"></p>
  </main>

  <script src="dist/script.js"></script>
</body>
</html>
