<!DOCTYPE html>
<html>
<head>
  <title>Totally Safe Website</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
    }

    #btn {
      position: absolute;
      padding: 15px 30px;
      background: red;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    h1 {
      margin-top: 50px;
    }
  </style>
</head>

<body>

<h1>Click the button to win ₹10,000 😎</h1>
<button id="btn">CLICK ME</button>

<script>
  const btn = document.getElementById("btn");

  function moveButton() {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    btn.style.left = x + "px";
    btn.style.top = y + "px";
  }

  btn.addEventListener("mouseover", moveButton);

  btn.addEventListener("click", () => {
    alert("HAHA 😂 you thought!");
    document.body.style.background =
      "rgb(" +
      Math.random()*255 + "," +
      Math.random()*255 + "," +
      Math.random()*255 + ")";
  });

  // spawn random buttons
  setInterval(() => {
    const b = document.createElement("button");
    b.innerText = "DON'T CLICK";
    b.style.position = "absolute";
    b.style.left = Math.random() * window.innerWidth + "px";
    b.style.top = Math.random() * window.innerHeight + "px";
    document.body.appendChild(b);
  }, 1000);
</script>

</body>
</html>
